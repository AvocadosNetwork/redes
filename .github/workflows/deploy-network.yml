name: Deploy Network Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
    permissions:
      contents: read
    env:
      KUBECONFIG: /home/pcc/.kube/config
      IMAGE_NAME: redes-web
      IMAGE_TAG: ${{ github.sha }}
      NAMESPACE: network
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version in HTML
        run: |
          SHORT_SHA=$(echo $IMAGE_TAG | cut -c1-7)
          sed -i "s|Version <span>[^<]*</span>|Version <span>${SHORT_SHA}</span>|g" index.html calculator.html

      - name: Build image with Docker
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker save $IMAGE_NAME:$IMAGE_TAG -o /tmp/$IMAGE_NAME.tar

      - name: Import image into containerd via kubectl
        run: |
          # Create a temporary privileged pod to import the image
          kubectl apply -f - <<YAML
          apiVersion: v1
          kind: Pod
          metadata:
            name: image-importer
            namespace: $NAMESPACE
          spec:
            nodeSelector:
              nodepool: dev
            restartPolicy: Never
            hostPID: true
            containers:
              - name: importer
                image: alpine:3.20
                securityContext:
                  privileged: true
                command: ["sleep", "300"]
                volumeMounts:
                  - name: containerd-sock
                    mountPath: /run/k3s/containerd/containerd.sock
            volumes:
              - name: containerd-sock
                hostPath:
                  path: /run/k3s/containerd/containerd.sock
          YAML

          kubectl wait --for=condition=Ready pod/image-importer -n $NAMESPACE --timeout=60s

          # Import via nsenter into the host
          kubectl exec -i image-importer -n $NAMESPACE -- \
            nsenter -t 1 -m -u -i -n -- \
            ctr -a /run/k3s/containerd/containerd.sock -n k8s.io images import - \
            < /tmp/$IMAGE_NAME.tar

          # Cleanup
          kubectl delete pod image-importer -n $NAMESPACE --force --grace-period=0
          rm -f /tmp/$IMAGE_NAME.tar

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f namespace.yaml -f service.yaml -f middleware.yaml -f ingress.yaml -f deployment.yaml
          kubectl -n $NAMESPACE set image deployment/redes web=$IMAGE_NAME:$IMAGE_TAG
          kubectl -n $NAMESPACE rollout status deployment/redes --timeout=180s
