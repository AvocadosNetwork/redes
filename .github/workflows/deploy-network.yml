name: Deploy Network Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
    permissions:
      contents: read
    env:
      KUBECONFIG: /home/pcc/.kube/config
      IMAGE_NAME: redes-web
      IMAGE_TAG: ${{ github.sha }}
      NAMESPACE: network
      CTR: /usr/local/bin/ctr
      CONTAINERD_SOCK: /run/k3s/containerd/containerd.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image with Docker
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker save $IMAGE_NAME:$IMAGE_TAG -o /tmp/$IMAGE_NAME.tar

      - name: Import image into containerd
        run: |
          $CTR -a $CONTAINERD_SOCK -n k8s.io images import /tmp/$IMAGE_NAME.tar
          rm -f /tmp/$IMAGE_NAME.tar

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f namespace.yaml -f service.yaml -f middleware.yaml -f ingress.yaml -f deployment.yaml
          kubectl -n $NAMESPACE set image deployment/redes web=$IMAGE_NAME:$IMAGE_TAG
          kubectl -n $NAMESPACE rollout status deployment/redes --timeout=180s
